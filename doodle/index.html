<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Generative Doodle Pad</title>
<style>
  :root {
    --bg: #0b0d12; --panel: rgba(23,26,33,0.72); --border: #2b313d;
    --text: #e8eaed; --muted: #8b93a1; --accent: #6effa0; --accent2: #5ec9ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #fx { pointer-events: none; }

  .brand {
    position: fixed; top: 14px; left: 16px; z-index: 5;
    display: flex; align-items: baseline; gap: 10px;
    pointer-events: none;
  }
  .brand a {
    pointer-events: auto;
    color: var(--muted); text-decoration: none; font-size: 0.8rem;
    background: var(--panel); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 999px; backdrop-filter: blur(8px);
  }
  .brand a:hover { color: var(--text); border-color: var(--accent); }
  .brand .name { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.02em; }

  .hint {
    position: fixed; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
    color: var(--muted); pointer-events: none;
    transition: opacity 0.5s ease;
    text-align: center; padding: 0 24px;
  }
  .hint .big { font-size: 1.5rem; font-weight: 600; color: var(--text); }
  .hint .small { font-size: 0.9rem; }
  .hint.hidden { opacity: 0; }

  .dock {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    z-index: 6; display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; justify-content: center;
    max-width: min(96vw, 860px);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px 12px;
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }

  .group { display: flex; align-items: center; gap: 8px; }
  .divider { width: 1px; align-self: stretch; background: var(--border); margin: 2px 2px; }

  .ctl { display: flex; flex-direction: column; gap: 3px; }
  .ctl label {
    font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); display: flex; justify-content: space-between; gap: 8px;
  }
  .ctl label .val { color: var(--accent); font-weight: 700; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 96px; height: 4px; border-radius: 999px;
    background: #333a47; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0b0d12; cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0b0d12; cursor: pointer;
  }

  button {
    font: inherit; font-size: 0.82rem;
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); border-radius: 10px; padding: 8px 12px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.08s;
    white-space: nowrap;
  }
  button:hover { background: rgba(255,255,255,0.09); }
  button:active { transform: scale(0.95); }
  button.on { border-color: var(--accent); color: var(--accent); background: rgba(110,255,160,0.1); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06210f; font-weight: 600; }

  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 26px; height: 26px; border-radius: 8px; padding: 0;
    border: 2px solid transparent; cursor: pointer;
  }
  .swatch.on { border-color: #fff; }
  .swatch[data-p="rainbow"] { background: conic-gradient(red, orange, yellow, lime, cyan, blue, magenta, red); }
  .swatch[data-p="sunset"]  { background: linear-gradient(135deg, #ff4d4d, #ffb347, #ffe66d); }
  .swatch[data-p="ocean"]   { background: linear-gradient(135deg, #23d5ab, #5ec9ff, #6a5cff); }
  .swatch[data-p="mono"]    { background: linear-gradient(135deg, #f5f5f5, #9aa3b0); }

  @media (max-width: 600px) {
    .dock { gap: 6px; padding: 8px; bottom: 10px; }
    input[type=range] { width: 74px; }
    .ctl label { font-size: 0.55rem; }
    button { padding: 7px 9px; font-size: 0.78rem; }
    .brand .name { display: none; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="art"></canvas>
    <canvas id="fx"></canvas>
  </div>

  <div class="brand">
    <a href="../">← Mini Games</a>
    <span class="name">Generative Doodle Pad</span>
  </div>

  <div class="hint" id="hint">
    <div class="big">✦ Draw anywhere</div>
    <div class="small">Your strokes mirror into kaleidoscope art. Try changing symmetry &amp; colors below.</div>
  </div>

  <div class="dock">
    <div class="ctl">
      <label>Symmetry <span class="val" id="symVal">8</span></label>
      <input type="range" id="sym" min="1" max="16" value="8" />
    </div>
    <div class="ctl">
      <label>Brush <span class="val" id="sizeVal">6</span></label>
      <input type="range" id="size" min="1" max="40" value="6" />
    </div>

    <div class="divider"></div>

    <div class="swatches" id="swatches">
      <button class="swatch on" data-p="rainbow" title="Rainbow"></button>
      <button class="swatch" data-p="sunset" title="Sunset"></button>
      <button class="swatch" data-p="ocean" title="Ocean"></button>
      <button class="swatch" data-p="mono" title="Mono"></button>
    </div>

    <div class="divider"></div>

    <button id="mirror" class="on" title="Kaleidoscope reflection">🔷 Mirror</button>
    <button id="sparks" class="on" title="Glowing particle trails">✨ Sparks</button>

    <div class="divider"></div>

    <button id="clear" title="Clear (C)">🗑 Clear</button>
    <button id="save" class="primary" title="Save PNG (S)">⬇ Save</button>
  </div>

<script>
(function () {
  "use strict";

  const artCanvas = document.getElementById("art");
  const fxCanvas  = document.getElementById("fx");
  const art = artCanvas.getContext("2d");
  const fx  = fxCanvas.getContext("2d");
  const hintEl = document.getElementById("hint");

  const BG = "#0b0d12";

  // ---- state ----------------------------------------------------------------
  const opts = {
    sym: 8,
    size: 6,
    palette: "rainbow",
    mirror: true,
    sparks: true,
  };

  let W = 0, H = 0, cx = 0, cy = 0, dpr = 1;
  let hue = 0;                 // continuously advancing hue phase
  let transforms = [];         // precomputed symmetry transforms
  const particles = [];
  const MAX_PARTICLES = 260;

  let drawing = false;
  let last = null;            // last pointer point {x, y}
  let hintGone = false;

  // ---- palettes -------------------------------------------------------------
  // each returns an [h, s, l] for a given advancing phase
  const palettes = {
    rainbow: (p) => [p % 360, 90, 60],
    sunset:  (p) => [(p * 0.5) % 55, 95, 58],            // reds → oranges → yellows
    ocean:   (p) => [165 + ((p * 0.6) % 80), 85, 58],    // teal → blue → violet
    mono:    (p) => [210, 12, 78 + 12 * Math.sin(p / 40)] // near-white shimmer
  };
  function colorAt(phase, light, alpha) {
    const [h, s, l] = palettes[opts.palette](phase);
    const L = light != null ? light : l;
    return `hsla(${h.toFixed(1)}, ${s}%, ${L.toFixed(1)}%, ${alpha == null ? 1 : alpha})`;
  }

  // ---- sizing ---------------------------------------------------------------
  function resize() {
    const rect = artCanvas.getBoundingClientRect();
    const newW = Math.max(1, rect.width);
    const newH = Math.max(1, rect.height);
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    // snapshot existing artwork so a resize doesn't wipe the canvas
    let snap = null;
    if (artCanvas.width > 0) {
      snap = document.createElement("canvas");
      snap.width = artCanvas.width;
      snap.height = artCanvas.height;
      snap.getContext("2d").drawImage(artCanvas, 0, 0);
    }

    for (const c of [artCanvas, fxCanvas]) {
      c.width = Math.round(newW * dpr);
      c.height = Math.round(newH * dpr);
    }
    art.setTransform(dpr, 0, 0, dpr, 0, 0);
    fx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (snap) art.drawImage(snap, 0, 0, snap.width, snap.height, 0, 0, newW, newH);

    W = newW; H = newH; cx = W / 2; cy = H / 2;
  }

  // ---- symmetry -------------------------------------------------------------
  function rebuildTransforms() {
    transforms = [];
    const n = opts.sym;
    for (let i = 0; i < n; i++) {
      const a = (i * 2 * Math.PI) / n;
      transforms.push({ c: Math.cos(a), s: Math.sin(a), m: false });
      if (opts.mirror) transforms.push({ c: Math.cos(a), s: Math.sin(a), m: true });
    }
  }
  function applyT(t, x, y) {
    let dx = x - cx, dy = y - cy;
    if (t.m) dx = -dx;                         // reflect across vertical axis
    return [cx + dx * t.c - dy * t.s, cy + dx * t.s + dy * t.c];
  }

  // ---- drawing --------------------------------------------------------------
  function strokeSegment(x0, y0, x1, y1, phase) {
    art.lineCap = "round";
    art.lineJoin = "round";
    art.lineWidth = opts.size;
    art.strokeStyle = colorAt(phase, null, 0.92);
    if (opts.size > 2) {
      art.shadowBlur = opts.size * 1.4;
      art.shadowColor = colorAt(phase, 65, 0.9);
    } else {
      art.shadowBlur = 0;
    }
    for (const t of transforms) {
      const [ax, ay] = applyT(t, x0, y0);
      const [bx, by] = applyT(t, x1, y1);
      art.beginPath();
      art.moveTo(ax, ay);
      art.lineTo(bx, by);
      art.stroke();
    }
    art.shadowBlur = 0;
  }

  function emitParticles(x, y, vx, vy, phase) {
    const speed = Math.min(6, Math.hypot(vx, vy));
    const count = 1 + Math.round(speed / 2);
    for (let i = 0; i < count; i++) {
      if (particles.length >= MAX_PARTICLES) particles.shift();
      const ang = Math.random() * Math.PI * 2;
      const spd = 0.4 + Math.random() * (0.6 + speed * 0.4);
      particles.push({
        x, y,
        vx: Math.cos(ang) * spd + vx * 0.15,
        vy: Math.sin(ang) * spd + vy * 0.15,
        life: 1,
        decay: 0.008 + Math.random() * 0.02,
        r: 1 + Math.random() * 2.2,
        phase: phase + Math.random() * 40,
      });
    }
  }

  // ---- pointer --------------------------------------------------------------
  function pointFromEvent(e) {
    const rect = artCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    last = pointFromEvent(e);
    if (!hintGone) { hintEl.classList.add("hidden"); hintGone = true; }
    // a dab so a tap leaves a mark
    strokeSegment(last.x, last.y, last.x + 0.01, last.y + 0.01, hue);
    if (opts.sparks) emitParticles(last.x, last.y, 0, 0, hue);
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pointFromEvent(e);
    const vx = p.x - last.x, vy = p.y - last.y;
    const dist = Math.hypot(vx, vy);
    hue += Math.min(12, 1 + dist * 0.4);      // color shifts as you draw
    strokeSegment(last.x, last.y, p.x, p.y, hue);
    if (opts.sparks) emitParticles(p.x, p.y, vx, vy, hue);
    last = p;
  }

  function end() { drawing = false; last = null; }

  artCanvas.addEventListener("mousedown", start);
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  artCanvas.addEventListener("touchstart", start, { passive: false });
  artCanvas.addEventListener("touchmove", move, { passive: false });
  window.addEventListener("touchend", end);

  // ---- animation loop -------------------------------------------------------
  function frame() {
    hue += 0.4; // gentle drift even when idle

    // fade the fx layer toward transparent → glowing trails
    fx.globalCompositeOperation = "destination-out";
    fx.fillStyle = "rgba(0,0,0,0.14)";
    fx.fillRect(0, 0, W, H);

    fx.globalCompositeOperation = "lighter";
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.98; p.vy *= 0.98;
      p.vy += 0.015;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      const col = colorAt(p.phase, 62, p.life);
      const rad = p.r * (0.5 + p.life);
      for (const t of transforms) {
        const [px, py] = applyT(t, p.x, p.y);
        fx.beginPath();
        fx.arc(px, py, rad, 0, Math.PI * 2);
        fx.fillStyle = col;
        fx.fill();
      }
    }
    fx.globalCompositeOperation = "source-over";
    requestAnimationFrame(frame);
  }

  // ---- controls -------------------------------------------------------------
  const symEl = document.getElementById("sym");
  const symVal = document.getElementById("symVal");
  const sizeEl = document.getElementById("size");
  const sizeVal = document.getElementById("sizeVal");

  symEl.addEventListener("input", () => {
    opts.sym = +symEl.value; symVal.textContent = symEl.value; rebuildTransforms();
  });
  sizeEl.addEventListener("input", () => {
    opts.size = +sizeEl.value; sizeVal.textContent = sizeEl.value;
  });

  document.getElementById("swatches").addEventListener("click", (e) => {
    const b = e.target.closest(".swatch");
    if (!b) return;
    opts.palette = b.dataset.p;
    document.querySelectorAll(".swatch").forEach((s) => s.classList.toggle("on", s === b));
  });

  const mirrorBtn = document.getElementById("mirror");
  mirrorBtn.addEventListener("click", () => {
    opts.mirror = !opts.mirror;
    mirrorBtn.classList.toggle("on", opts.mirror);
    rebuildTransforms();
  });

  const sparksBtn = document.getElementById("sparks");
  sparksBtn.addEventListener("click", () => {
    opts.sparks = !opts.sparks;
    sparksBtn.classList.toggle("on", opts.sparks);
  });

  function clearCanvas() {
    art.clearRect(0, 0, W, H);
    fx.clearRect(0, 0, W, H);
    particles.length = 0;
    hintEl.classList.remove("hidden");
    hintGone = false;
  }
  document.getElementById("clear").addEventListener("click", clearCanvas);

  function save() {
    const out = document.createElement("canvas");
    out.width = artCanvas.width;
    out.height = artCanvas.height;
    const o = out.getContext("2d");
    o.fillStyle = BG;
    o.fillRect(0, 0, out.width, out.height);
    o.drawImage(fxCanvas, 0, 0);   // trails first (dimmer)
    o.drawImage(artCanvas, 0, 0);  // strokes on top
    const a = document.createElement("a");
    a.download = "doodle-" + Date.now() + ".png";
    a.href = out.toDataURL("image/png");
    a.click();
  }
  document.getElementById("save").addEventListener("click", save);

  window.addEventListener("keydown", (e) => {
    if (e.key === "c" || e.key === "C") clearCanvas();
    if (e.key === "s" || e.key === "S") save();
  });

  // ---- boot -----------------------------------------------------------------
  window.addEventListener("resize", () => { resize(); rebuildTransforms(); });
  resize();
  rebuildTransforms();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
